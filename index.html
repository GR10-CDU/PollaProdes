<style>
:root{
  --bg:#04080F;--bg2:#080E1A;--card:#0C1220;--card2:#111826;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --accent:#00E090;--accent2:#00B872;--gold:#FFB800;--gold2:#CC9200;
  --red:#FF3D6B;--blue:#3D9BFF;--purple:#9B6DFF;
  --text:#FFF;--text2:#6B7A8D;--text3:#3D4A5C;
  --L:#3D9BFF;--E:#FFD60A;--V:#FF3D6B;
  --fd:'Barlow Condensed',sans-serif;--fb:'DM Sans',sans-serif;
  --r:14px;--rs:8px;--sw:240px;--th:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);font-family:var(--fb);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
input,button{font-family:var(--fb)}
button{cursor:pointer;border:none;background:none;color:inherit}
button:active{transform:scale(.97)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input::placeholder{color:var(--text3)}
input:focus{outline:none;border-color:rgba(0,224,144,.5)!important}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 8px rgba(0,224,144,.4))}50%{filter:drop-shadow(0 0 18px rgba(0,224,144,.7))}}
.fu{animation:fu .3s ease forwards}
.fi{animation:fi .25s ease forwards}

/* LAYOUT DESKTOP */

.ni:hover{background:rgba(255,255,255,.04);color:var(--text)}
.ni.active{background:rgba(0,224,144,.08);color:var(--accent);border-left-color:var(--accent);font-weight:600}

.btnlo:hover{background:rgba(255,61,107,.15);color:var(--red)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* MOBILE */

  body{overflow:hidden}
}

<body>

<div id="app">

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyPPKluGEMXSluoImUUTgWxxv8YEE_jV7LQ56bv72C9RdGxcCJ95GYsdP2gcSCpYPQ/exec";
const API_SECRET="PP2026-xK9mQ7vL2nR4wT8yU3pA5cE1hG6jF0bD";
const SK="pp_session",UK="pp_user";
const App={user:null,token:null,screen:null,ctx:{}};

// ── API (CORS fix: text/plain) ──
async function api(action,p={}){
  const b={action,apiSecret:API_SECRET,sessionToken:App.token||undefined,...p};
  try{
    const r=await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify(b),
      redirect:"follow"
    });
    return await r.json();
  }catch(e){return{ok:false,error:"Sin conexión: "+e.message};}
}

function save(u,t){App.user=u;App.token=t;localStorage.setItem(SK,t);localStorage.setItem(UK,JSON.stringify(u));}
function load(){const t=localStorage.getItem(SK),u=localStorage.getItem(UK);if(t&&u){App.token=t;App.user=JSON.parse(u);return true;}return false;}
function logout(){api("logout");localStorage.removeItem(SK);localStorage.removeItem(UK);App.user=null;App.token=null;showLogin();}

const NAV_J=[
  {k:"fechas",i:"📅",l:"Fechas",t:"Fechas Disponibles"},
  {k:"tabla",i:"🏆",l:"Tabla",t:"Tabla de Posiciones"},
  {k:"grilla",i:"👥",l:"Los Otros",t:"Los Otros"},
  {k:"stats",i:"📊",l:"Estadísticas",t:"Hall of Fame"},
  {k:"perfil",i:"👤",l:"Perfil",t:"Mi Perfil"},
];
const NAV_A=[
  {k:"admin-dash",i:"📊",l:"Dashboard",t:"Dashboard"},
  {k:"admin-fechas",i:"📅",l:"Fechas",t:"Gestión de Fechas"},
  {k:"admin-res",i:"⚽",l:"Resultados",t:"Ingresar Resultados"},
  {k:"admin-users",i:"👥",l:"Jugadores",t:"Jugadores"},
  {k:"perfil",i:"👤",l:"Perfil",t:"Mi Perfil"},
];
function nav(){return App.user?.rol==="Admin"?NAV_A:NAV_J;}

function go(k,ctx={}){
  App.screen=k;App.ctx=ctx;
  const item=nav().find(n=>n.k===k)||{t:k};
  renderNav();
  const tt=document.getElementById("tt");if(tt)tt.textContent=item.t||k;
  const html=renderScreen(k,ctx);
  const dc=document.getElementById("content");if(dc)dc.innerHTML=html;
  const mc=document.getElementById("mc");if(mc)mc.innerHTML=html;
  setTimeout(()=>afterRender(k,ctx),50);
}

function renderNav(){
  const n=nav();
  const sn=document.getElementById("sidebar-nav");
  if(sn)sn.innerHTML=n.map(x=>`<div class="ni${App.screen===x.k?" active":""}" onclick="go('${x.k}')"><span class="ic">${x.i}</span><span>${x.l}</span></div>`).join("");
  const bn=document.getElementById("bni");
  if(bn)bn.innerHTML=n.slice(0,5).map(x=>`<div class="bni-item${App.screen===x.k?" active":""}" onclick="go('${x.k}')"><span class="ic">${x.i}</span><span class="lb">${x.l}</span></div>`).join("");
}

function renderScreen(k,ctx){
  switch(k){
    case"fechas":return rFechas();
    case"fecha-det":return rFechaDet(ctx);
    case"jugar":return rJugar(ctx);
    case"tabla":return rTabla(ctx);
    case"grilla":return rGrilla(ctx);
    case"stats":return rStats();
    case"perfil":return rPerfil();
    case"admin-dash":return rAdminDash();
    case"admin-fechas":return rAdminFechas();
    case"admin-res":return rAdminRes();
    case"admin-users":return rAdminUsers();
    default:return`<div class="es"><div class="ic">🔧</div><p>En construcción</p></div>`;
  }
}

/* ── LOGO SVG reutilizable ── */
function logoSVG(size,color){
  color=color||"var(--accent)";
  return`<svg width="${size}" height="${size}" style="color:${color}"><use href="#logo"/></svg>`;
}

/* ── FECHAS ── */
function rFechas(){return`<div class="fu"><div class="ph"><h2>FECHAS</h2><p>Seleccioná una fecha para jugar</p></div><div id="fl"><div class="sw"><div class="spinner"></div></div></div></div>`;}
async function lFechas(){
  const r=await api("getFechas"),el=document.getElementById("fl");
  if(!el)return;
  if(!r.ok){el.innerHTML=`<div class="err">⚠ ${r.error}</div>`;return;}
  if(!r.fechas?.length){el.innerHTML=`<div class="es"><div class="ic">📅</div><p>No hay fechas disponibles</p></div>`;return;}
  el.innerHTML=r.fechas.map(f=>{
    const mins=f.minutosRestantes,urg=mins<120&&mins>0;
    const pt=mins<=0?"Plazo vencido":mins<60?`⏱ ${mins}min`:mins<1440?`⏱ ${Math.floor(mins/60)}hs`:`📅 ${new Date(f.plazoLimite).toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"})}`;
    return`<div class="fc" onclick="go('fecha-det',{fechaId:'${f.id}'})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div class="nom">${f.nombre}</div>
        <span class="bdg ${f.estado==="Abierta"?"bg":f.estado==="Cerrada"?"bred":"bgray"}">${f.estado}</span>
      </div>
      ${f.descripcion?`<p style="font-size:13px;color:var(--text2);margin-bottom:8px">${f.descripcion}</p>`:""}
      <div style="display:flex;gap:8px;font-size:12px;color:var(--text2);flex-wrap:wrap">
        <span style="${urg?"color:var(--red);font-weight:600":""}">${pt}</span>
        <span style="color:var(--text3)">·</span><span>${f.liga}</span>
      </div>
      <div class="foot">
        <span style="font-size:12px;color:var(--text2)">⚽ ${f.cantPartidos} partidos</span>
        ${f.puedeJugar?`<span class="btn btn-p" style="padding:6px 13px;font-size:12px">JUGAR →</span>`:`<span style="font-size:12px;color:var(--text2)">Ver →</span>`}
      </div>
    </div>`;
  }).join("");
}

/* ── DETALLE FECHA ── */
function rFechaDet(ctx){return`<div class="fu"><div class="bk" onclick="go('fechas')">← Volver</div><div id="fdc"><div class="sw"><div class="spinner"></div></div></div></div>`;}
async function lFechaDet(ctx){
  const r=await api("getFecha",{fechaId:ctx.fechaId}),el=document.getElementById("fdc");
  if(!el)return;
  if(!r.ok){el.innerHTML=`<div class="err">${r.error}</div>`;return;}
  const f=r.fecha,ps=r.partidos||[];
  el.innerHTML=`
    <div class="card" style="margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div><h2 style="font-family:var(--fd);font-size:26px;font-weight:900">${f.nombre}</h2>
        <p style="font-size:12px;color:var(--text2);margin-top:3px">${f.liga} · ${f.temporada}</p></div>
        <span class="bdg ${f.estado==="Abierta"?"bg":f.estado==="Cerrada"?"bred":"bgray"}">${f.estado}</span>
      </div>
      <div style="display:flex;gap:16px;font-size:12px;color:var(--text2)">
        <span>⚽ ${f.cantPartidos} partidos</span>
        ${f.minutosRestantes>0?`<span>⏱ ${f.minutosRestantes<60?f.minutosRestantes+"min":Math.floor(f.minutosRestantes/60)+"hs"}</span>`:`<span style="color:var(--red)">🔒 Cerrada</span>`}
      </div>
    </div>
    <p class="st">PARTIDOS</p>
    ${ps.map(p=>`
      <div class="card csm" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="display:flex;align-items:center;gap:8px;flex:1">
            <span style="font-size:11px;font-weight:700;color:var(--text3)">#${p.numero}</span>
            <div style="flex:1">
              <div style="font-family:var(--fd);font-size:16px;font-weight:700">${p.local} <span style="color:var(--text3);font-size:12px">vs</span> ${p.visita}</div>
              <div style="font-size:11px;color:var(--text2)">${p.liga}${p.fechaHora?" · "+new Date(p.fechaHora).toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"}):""}</div>
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            ${p.tipo!=="Normal"?`<span class="bdg ${p.tipo==="Polla"?"bgold":"bgray"}">${p.tipo==="Polla"?"⭐":"×2"} ${p.tipo}</span>`:""}
            ${p.golesLocal!==null?`<span style="font-family:var(--fd);font-size:20px;font-weight:900">${p.golesLocal}-${p.golesVisita}</span>`:""}
            ${p.estado==="En Vivo"?`<span class="bdg blive">● VIVO</span>`:""}
          </div>
        </div>
      </div>`).join("")}
    ${f.puedeJugar?`
      <p class="st" style="margin-top:22px">ELEGÍ TU POZO</p>
      <div id="pl2"><div class="sw"><div class="spinner"></div></div></div>
      <div id="bjw" style="margin-top:18px;display:none"></div>
    `:`
      <div style="margin-top:22px;padding:16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r);text-align:center">
        <p style="color:var(--text2);font-size:14px">🔒 Pronósticos cerrados para esta fecha</p>
      </div>`}`;
  if(f.puedeJugar)lPozos(ctx.fechaId);
}

async function lPozos(fid){
  const r=await api("getPozos",{fechaId:fid,userId:App.user?.id}),el=document.getElementById("pl2");
  if(!el)return;
  if(!r.ok){el.innerHTML=`<div class="err">${r.error}</div>`;return;}
  window._pozos=r.pozos;window._fid=fid;window._sp=null;
  if(!r.pozos?.length){el.innerHTML=`<div class="es"><div class="ic">💰</div><p>Sin pozos configurados</p></div>`;return;}
  el.innerHTML=`<div class="g2">${r.pozos.map(p=>`
    <div class="pc${p.yaInscripto?" ya":""}" id="poz-${p.id}" onclick="${p.yaInscripto?"":"selP('"+p.id+"')"}">
      ${p.yaInscripto?`<span class="bdg bg" style="margin-bottom:8px;display:inline-flex">✓ INSCRIPTO</span><br>`:""}
      <div class="pm">$${p.monto.toLocaleString("es-AR")}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">${p.tipo==="Cerrado"?"🔒 Grupo":"Abierto"}</div>
      <div class="dv" style="margin:8px 0"></div>
      <div class="pp">$${p.premioGanador.toLocaleString("es-AR")}</div>
      <div style="font-size:11px;color:var(--text2)">Premio estimado</div>
      <div style="font-size:12px;color:var(--text2);margin-top:8px">👥 ${p.inscriptos} inscripto${p.inscriptos!==1?"s":""}</div>
    </div>`).join("")}</div>
    <div style="text-align:center;padding:10px 0">
      <span style="font-size:12px;color:var(--text2);cursor:pointer" onclick="togGrupo()">🔒 Tengo código de grupo cerrado →</span>
    </div>
    <div id="gf" style="display:none;margin-top:10px">
      <div class="ig"><label class="il">CÓDIGO DE GRUPO</label>
      <input class="inp" id="ic" placeholder="Ej: AB1234" maxlength="6" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')buscar()"/></div>
      <button class="btn btn-s" style="margin-top:10px;width:100%" onclick="buscar()">BUSCAR</button>
      <div id="gr"></div>
    </div>`;
  const ya=r.pozos.find(p=>p.yaInscripto);
  if(ya){const bw=document.getElementById("bjw");if(bw){bw.style.display="block";bw.innerHTML=`<button class="btn btn-p btn-lg" onclick="go('jugar',{fechaId:'${fid}',pozoId:'${ya.id}'})">▶ JUGAR →</button>`;}}
}

window.selP=id=>{window._sp=id;document.querySelectorAll(".pc").forEach(c=>c.classList.remove("sel"));const e=document.getElementById("poz-"+id);if(e)e.classList.add("sel");const bw=document.getElementById("bjw");if(bw){bw.style.display="block";bw.innerHTML=`<button class="btn btn-p btn-lg" onclick="insc()">PAGAR Y JUGAR →</button>`;}};
window.togGrupo=()=>{const e=document.getElementById("gf");if(e)e.style.display=e.style.display==="none"?"block":"none";};
window.buscar=async()=>{
  const c=document.getElementById("ic")?.value;if(!c||c.length<4){toast("Ingresá el código");return;}
  const r=await api("getGrupoPorCodigo",{codigo:c}),el=document.getElementById("gr");if(!el)return;
  if(!r.ok){el.innerHTML=`<div class="err" style="margin-top:10px">${r.error}</div>`;return;}
  el.innerHTML=`<div class="card" style="margin-top:12px;border-color:rgba(0,224,144,.2)">
    <p style="font-family:var(--fd);font-size:18px;font-weight:800">${r.grupo.nombre}</p>
    <p style="font-size:12px;color:var(--text2)">👥 ${r.grupo.miembros} miembro${r.grupo.miembros!==1?"s":""}</p>
    <p style="font-family:var(--fd);font-size:22px;font-weight:900;color:var(--gold);margin-top:8px">$${(r.pozo?.premioEstimado||0).toLocaleString("es-AR")} est.</p>
    <button class="btn btn-p" style="margin-top:12px;width:100%" onclick="selP('${r.grupo.pozoId}');insc()">UNIRSE — $${(r.pozo?.monto||0).toLocaleString("es-AR")}</button>
  </div>`;
};
window.insc=async()=>{
  if(!window._sp){toast("Seleccioná un pozo");return;}
  const r=await api("inscribirse",{fechaId:window._fid,pozoId:window._sp});
  if(!r.ok){toast("❌ "+r.error);return;}
  if(r.habilitado){toast("✅ ¡Habilitado!");setTimeout(()=>go("jugar",{fechaId:window._fid,pozoId:window._sp}),900);}
  else{toast("🔄 Procesando pago...");const mp=await api("crearPreferencia",{inscripcionId:r.inscripcionId});if(mp.ok&&mp.initPoint)window.location.href=mp.initPoint;else toast("💡 "+(mp.error||"MP no configurado aún"));}
};

/* ── JUGAR ── */
window._pr={};window._re={};window._ct={};window._pa=[];
function rJugar(ctx){return`<div class="fu"><div class="bk" onclick="go('fecha-det',{fechaId:'${ctx.fechaId}'})">← Volver</div><div class="prg"><div class="prgf" id="pb" style="width:0%"></div></div><div id="jc"><div class="sw"><div class="spinner"></div></div></div><div id="jf" style="margin-top:18px"></div></div>`;}
async function lJugar(ctx){
  const[rf,rm]=await Promise.all([api("getFecha",{fechaId:ctx.fechaId}),api("getMiFecha",{fechaId:ctx.fechaId,pozoId:ctx.pozoId})]);
  if(!rf.ok){toast("Error cargando fecha");return;}
  window._ct=ctx;window._pa=rf.partidos||[];window._pr={};window._re={};
  if(rm.ok){rm.pronos?.forEach(p=>{window._pr[p.partidoId]={v:p.pronostico,cr:p.cambiosRestantes,reg:p.tieneRegla};});rm.reglas?.forEach(r=>{window._re[r.partidoId]=r;});}
  rParts(rf.partidos,ctx,rf.fecha.puedeJugar);
}
function rParts(parts,ctx,puede){
  const el=document.getElementById("jc");if(!el)return;
  const comp=Object.keys(window._pr).length,tot=parts.length;
  const pb=document.getElementById("pb");if(pb)pb.style.width=`${(comp/tot)*100}%`;
  el.innerHTML=parts.map(p=>{
    const pr=window._pr[p.id]||{},re=window._re[p.id];
    const sel=pr.v,cr=pr.cr!==undefined?pr.cr:3,bloq=!!re||cr===0||!puede||p.golesLocal!==null;
    return`<div class="pcard${sel?" ok":""}" id="pc-${p.id}">
      <div class="ph2">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;color:var(--text2)">#${p.numero}</span>
          ${p.tipo!=="Normal"?`<span class="bdg ${p.tipo==="Polla"?"bgold":"bgray"}">${p.tipo==="Polla"?"⭐":"×2"} ${p.tipo}</span>`:`<span class="bdg bgray">NORMAL</span>`}
          ${p.estado==="En Vivo"?`<span class="bdg blive">● VIVO</span>`:""}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${sel?`<span class="cb ${cr===3?"ok":cr>0?"warn":"ag"}">🔄 ${cr}</span>`:""}
          ${sel?`<span class="rb${re?" ap":""}" onclick="openReg('${p.id}')">⭐ ${re?re.codigo:"REGLA"}</span>`:""}
        </div>
      </div>
      <div class="pteams">
        <span class="pt">${p.local}</span>
        ${p.golesLocal!==null?`<span class="psc">${p.golesLocal}-${p.golesVisita}</span>`:`<span class="pvs">VS</span>`}
        <span class="pt r">${p.visita}</span>
      </div>
      ${!bloq?`<div class="lev">${["L","E","V"].map(v=>{const pc=v==="L"?p.pct?.pctL:v==="E"?p.pct?.pctE:p.pct?.pctV;return`<button class="lb2 ${v}${sel===v?" sel":""}" onclick="gP('${p.id}','${v}','${ctx.fechaId}','${ctx.pozoId}')"><span class="ll">${v}</span><span class="lp">${pc||"?"}%</span></button>`;}).join("")}</div>`
      :sel?`<div style="padding:9px 12px;background:rgba(255,255,255,.04);border-radius:8px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--text2)">${re?"🔒 Regla":cr===0?"🚫 Sin cambios":"Tu pronóstico"}</span>
        <span style="font-family:var(--fd);font-size:24px;font-weight:900;color:${sel==="L"?"var(--L)":sel==="E"?"var(--E)":"var(--V)"}">${sel}</span></div>`
      :`<div style="padding:9px 12px;background:rgba(255,255,255,.03);border-radius:8px;text-align:center;font-size:12px;color:var(--text3)">Sin pronóstico</div>`}
      <div class="pbar"><div class="pl" style="width:${p.pct?.pctL||33}%"></div><div class="pe" style="width:${p.pct?.pctE||34}%"></div><div class="pv" style="width:${p.pct?.pctV||33}%"></div></div>
    </div>`;
  }).join("");
  const jf=document.getElementById("jf");
  if(jf&&puede)jf.innerHTML=`<button class="btn btn-p btn-lg" onclick="ag()">💾 GUARDAR PRONÓSTICOS</button>`;
}
window.gP=async(pid,v,fid,poid)=>{
  const prev=window._pr[pid]?{...window._pr[pid]}:null;
  if(!window._pr[pid])window._pr[pid]={v,cr:3,reg:false};
  else{window._pr[pid].v=v;window._pr[pid].cr=Math.max(0,(prev?.cr||3)-1);}
  rParts(window._pa,window._ct,true);
  const r=await api("guardarPronostico",{fechaId:fid,pozoId:poid,partidoId:pid,pronostico:v});
  if(!r.ok){toast("❌ "+r.error);if(prev)window._pr[pid]=prev;else delete window._pr[pid];rParts(window._pa,window._ct,true);return;}
  if(r.cambiosRestantes!==undefined){window._pr[pid].cr=r.cambiosRestantes;rParts(window._pa,window._ct,true);}
  if(r.mensaje&&r.cambio)toast(r.mensaje);
};
window.ag=async()=>{
  const ps=Object.entries(window._pr).map(([id,p])=>({partidoId:id,pronostico:p.v}));
  const r=await api("autoguardar",{fechaId:window._ct.fechaId,pozoId:window._ct.pozoId,pronos:ps});

      <button class="btn btn-s" style="padding:5px 10px;font-size:11px" onclick="chSt('${u.id}','${u.estado==="Activo"?"Suspendido":"Activo"}')">${u.estado==="Activo"?"Suspender":"Activar"}</button>
    </div>
  </div>`).join("")||`<div class="es"><div class="ic">👥</div><p>Sin jugadores</p></div>`;
}
window.chSt=async(id,est)=>{if(!confirm(`¿${est==="Suspendido"?"Suspender":"Activar"} este usuario?`))return;const r=await api("adminCambiarEstado",{targetUserId:id,estado:est});toast(r.ok?"✅ Actualizado":"❌ "+r.error);if(r.ok)lAdminUsers();};

/* ── AFTER RENDER ── */
function afterRender(k,ctx){
  switch(k){
    case"fechas":lFechas();break;
    case"fecha-det":lFechaDet(ctx);break;
    case"jugar":lJugar(ctx);break;
    case"tabla":lTabla(ctx);break;
    case"grilla":lGrilla(ctx);break;
    case"stats":lStats();break;
    case"admin-dash":lAdminDash();break;
    case"admin-fechas":lAdminFechas();break;
    case"admin-res":lAdminRes(ctx);break;
    case"admin-users":lAdminUsers();break;
  }
}

/* ── LOGIN ── */
function showLogin(){
  document.getElementById("app").style.display="none";
  ["mh","mc","bn"].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display="none";});
  const el=document.getElementById("sl");el.style.display="flex";
  el.innerHTML=`<div class="lb fu">
    <div class="llo">
      <div class="logo-wrap">
        <svg width="90" height="90" style="color:var(--accent)"><use href="#logo"/></svg>
      </div>
      <h1>POLLA PRODES</h1>
      <p>pollaprodes.com · El juego de pronósticos</p>
    </div>
    <div class="lcard">
      <div class="ltabs"><div class="ltab active" onclick="ltab('l',this)">INGRESAR</div><div class="ltab" onclick="ltab('r',this)">REGISTRARSE</div></div>
      <div id="lf">
        <div class="fg">
          <div class="ig"><label class="il">TELÉFONO</label><input class="inp" id="lt" type="tel" placeholder="+5493442xxxxxx" onkeydown="if(event.key==='Enter')doL()"/></div>
          <div class="ig"><label class="il">PIN</label><input class="inp" id="lp" type="password" placeholder="4-8 dígitos" maxlength="8" onkeydown="if(event.key==='Enter')doL()"/></div>
          <div id="le"></div>
          <button class="btn btn-p btn-lg" id="blb" onclick="doL()">ENTRAR</button>
        </div>
      </div>
      <div id="rf" style="display:none">
        <div class="fg">
          <div class="ig"><label class="il">NOMBRE COMPLETO</label><input class="inp" id="rn" placeholder="Nombre Apellido"/></div>
          <div class="ig"><label class="il">TELÉFONO</label><input class="inp" id="rt" type="tel" placeholder="+5493442xxxxxx"/></div>
          <div class="ig"><label class="il">PIN (4-8 dígitos)</label><input class="inp" id="rp" type="password" placeholder="Elegí tu PIN" maxlength="8"/></div>
          <div class="ig"><label class="il">ALIAS MERCADOPAGO</label><input class="inp" id="ra" placeholder="tu.alias.mp"/></div>
          <div class="ig"><label class="il">EMAIL (opcional)</label><input class="inp" id="re2" type="email" placeholder="tu@email.com"/></div>
          <div id="re"></div>
          <button class="btn btn-p btn-lg" onclick="doR()">CREAR CUENTA</button>
        </div>
      </div>
    </div>
  </div>`;
}

window.ltab=(t,el)=>{document.querySelectorAll(".ltab").forEach(x=>x.classList.remove("active"));el.classList.add("active");document.getElementById("lf").style.display=t==="l"?"block":"none";document.getElementById("rf").style.display=t==="r"?"block":"none";};
window.doL=async()=>{
  const t=document.getElementById("lt")?.value,p=document.getElementById("lp")?.value,b=document.getElementById("blb"),er=document.getElementById("le");
  if(!t||!p){if(er)er.innerHTML=`<div class="err">Completá todos los campos</div>`;return;}
  if(b){b.textContent="INGRESANDO...";b.disabled=true;}
  const r=await api("login",{telefono:t,pin:p});
  if(b){b.textContent="ENTRAR";b.disabled=false;}
  if(!r.ok){if(er)er.innerHTML=`<div class="err">⚠ ${r.error}</div>`;return;}
  save(r.user,r.sessionToken);initApp();
};
window.doR=async()=>{
  const n=document.getElementById("rn")?.value,t=document.getElementById("rt")?.value,p=document.getElementById("rp")?.value,a=document.getElementById("ra")?.value,e=document.getElementById("re2")?.value,er=document.getElementById("re");
  if(!n||!t||!p){if(er)er.innerHTML=`<div class="err">Completá los campos obligatorios</div>`;return;}
  const r=await api("registro",{nombre:n,telefono:t,pin:p,alias:a,email:e});
  if(!r.ok){if(er)er.innerHTML=`<div class="err">⚠ ${r.error}</div>`;return;}
  save(r.user,r.sessionToken);toast(`✅ Bienvenido, ${r.user.usuario}`);initApp();
};

/* ── INIT APP ── */
function initApp(){
  document.getElementById("sl").style.display="none";
  const mob=window.innerWidth<=768;
  if(mob){
    ["mh","mc","bn"].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display=id==="mc"?"block":"flex";});
    const ch=document.getElementById("mchip");if(ch)ch.textContent=App.user?.usuario||"";
  }else{
    document.getElementById("app").style.display="flex";
    const sb=document.getElementById("sidebar"),mn=document.getElementById("main");
    if(sb)sb.style.display="flex";if(mn)mn.style.display="flex";
    const su=document.getElementById("sidebar-user");
    if(su)su.innerHTML=`<div class="sav">${App.user?.avatar||"👤"}</div><div class="sui"><div class="nm">${App.user?.usuario||""}</div><div class="rl">${App.user?.rol||"Jugador"}</div></div><button class="btnlo" onclick="if(confirm('¿Cerrar sesión?'))logout()" title="Salir">⎋</button>`;
  }
  go(App.user?.rol==="Admin"?"admin-dash":"fechas");
}

/* ── TOAST ── */
function toast(msg,ms=2800){document.querySelectorAll(".toast").forEach(t=>t.remove());const e=document.createElement("div");e.className="toast";e.textContent=msg;document.body.appendChild(e);setTimeout(()=>e.remove(),ms);}

/* ── RETORNO MP ── */
(()=>{const p=new URLSearchParams(location.search).get("pago");if(!p)return;history.replaceState({},"",location.pathname);if(p==="ok")toast("✅ ¡Pago aprobado! Podés jugar");else if(p==="error")toast("❌ Pago no procesado");else toast("⏳ Pago pendiente de acreditación");})();

/* ── BOOT ── */
async function boot(){
  if(load()){
    const r=await api("loginConToken",{sessionToken:App.token});
    if(r.ok){save(r.user,r.sessionToken);initApp();return;}
  }
  showLogin();
}
boot();
</script>
</body>
</html>
