async function api(action,params={}){
  if(!SCRIPT_URL){await new Promise(r=>setTimeout(r,300));return mockRes(action,params);}
  try{
    const r=await fetch(SCRIPT_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action,...params})});
    return await r.json();
  }catch{return mockRes(action,params);}
}
function mockRes(action,p){
  switch(action){
    case"login":
      if(p.email==="admin@prode.com"&&p.pass==="1234") return{ok:true,user:{id:"ADM001",nombre:"Admin",role:"admin"}};
      if(p.email==="german@gmail.com"&&p.pass==="1234") return{ok:true,user:{id:"USR001",nombre:"Germán R.",role:"jugador"}};
      return{ok:false,error:"Email o contraseña incorrectos"};
    case"getPartidos": return{ok:true,partidos:MOCK_PARTIDOS,fechaCerrada:false,fecha:1,misPronos:{}};
    case"getTabla":    return{ok:true,tabla:MOCK_TABLA};
    case"getMisPuntajes": return{ok:true,puntajes:MOCK_PUNTAJES,total:40};
    case"getAdminStats":  return{ok:true,stats:{participantes:8,fechaActual:1,pronHoy:6,pendientes:2}};
    case"getParticipantes": return{ok:true,participantes:MOCK_PARTICIPANTES};
    default: return{ok:true};
  }
}

    api("getPartidos",{userId:user.id}).then(r=>{

        setFecha(r.fecha||1);

    setSaving(true);

    setSaving(false);setSaved(true);

            <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:48,fontWeight:900,lineHeight:1,letterSpacing:1}}>FECHA {fecha}</h2>

            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:800,color:comp===total?C.accent:C.text,lineHeight:1}}>{comp}/{total}</span>
            <p style={{fontSize:10,color:C.text2,marginTop:2,letterSpacing:.5}}>pronósticos</p>

      </div>

        {partidos.map(p=>{
          const sel=pronos[p.n];

          return(
            <div key={p.n} style={{

                    const clr=v==="L"?C.L:v==="E"?C.E:C.V;

              {isSel&&regla.tipo==="E3"&&(

                      return(
                        <button key={p.n}

      <div style={{padding:"16px 16px 32px"}}>

          width:"100%",padding:"15px 0",
          background:saved?"rgba(0,200,150,.12)":`linear-gradient(135deg,${C.gold},#CC8E00)`,

        }}>{saving?"GUARDANDO...":saved?"✓ REGLAS GUARDADAS":"GUARDAR REGLAS ESPECIALES"}</button>
      </div>
    </div>
  );

// ═══════════════════════════════════════════════
//  RESPONSIVE HOOK
// ═══════════════════════════════════════════════
function useIsDesktop(){
  const[isDesktop,setIsDesktop]=useState(window.innerWidth>=900);
  useEffect(()=>{
    const fn=()=>setIsDesktop(window.innerWidth>=900);
    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);
  return isDesktop;
}

// ═══════════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════════
function AppProde(){
  const[user,setUser]=useState(null);
  const[screen,setScreen]=useState("login");
  const[pronos,setPronos]=useState({});
  const[partidos,setPartidos]=useState(MOCK_PARTIDOS);
  const[tabla,setTabla]=useState(MOCK_TABLA);
  const isDesktop=useIsDesktop();

  useEffect(()=>{
    if(user) api("getTabla").then(r=>{if(r.ok)setTabla(r.tabla);});
  },[user]);

  const handleLogin=u=>{setUser(u);setScreen(u.role==="admin"?"admin-dashboard":"fecha");};
  const handleLogout=()=>{setUser(null);setScreen("login");setPronos({});};

  if(!user) return React.createElement(LoginScreen,{onLogin:handleLogin});

  if(user.role==="admin"){
    const adminNav=[
      {key:"admin-dashboard",     icon:"📊",label:"Dashboard"},
      {key:"admin-partidos",      icon:"⚽",label:"Partidos"},
      {key:"admin-resultados",    icon:"🎯",label:"Resultados"},
      {key:"admin-pronosticos",   icon:"📋",label:"Pronósticos"},
      {key:"admin-participantes", icon:"👥",label:"Jugadores"},
    ];
    const adminScreens={
      "admin-dashboard":    React.createElement(AdminDashboard),
      "admin-partidos":     React.createElement(AdminPartidosScreen),
      "admin-resultados":   React.createElement(AdminResultadosScreen),
      "admin-pronosticos":  React.createElement(AdminPronosticosScreen),
      "admin-participantes":React.createElement(AdminParticipantesScreen),
    };
    const currentScreen=adminScreens[screen]||adminScreens["admin-dashboard"];

    if(isDesktop){
      return(
        <div style={{background:C.bg,minHeight:"100vh"}}>
          <DemoBanner/>
          <div style={{display:"flex",height:"calc(100vh - (SCRIPT_URL?0:32px))"}}>
            <Sidebar nav={adminNav} screen={screen} setScreen={setScreen}
              activeColor={C.V} user={user} onLogout={handleLogout}
              title="ADMIN PANEL"/>
            <div style={{flex:1,overflowY:"auto",maxWidth:900}}>
              {currentScreen}
            </div>
          </div>
        </div>
      );
    }
    return(
      <div style={{background:C.bg,minHeight:"100vh",paddingBottom:72}}>
        <DemoBanner/>
        <div style={{padding:"13px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",background:C.card,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:20}}>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,letterSpacing:2,color:C.V}}>⚙ ADMIN</span>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:12,color:C.text2}}>{user.nombre}</span>
            <button onClick={handleLogout} style={{background:"rgba(255,255,255,.06)",border:"none",width:32,height:32,borderRadius:8,color:C.text2,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>⎋</button>
          </div>
        </div>
        {currentScreen}
        <BottomNav nav={adminNav} screen={screen} setScreen={setScreen} activeColor={C.V}/>
      </div>
    );
  }

  // ── JUGADOR ──
  const jugNav=[
    {key:"fecha",      icon:"📅",label:"Fecha"},
    {key:"tabla",      icon:"🏆",label:"Tabla"},
    {key:"puntos",     icon:"⭐",label:"Mis Pts"},
    {key:"resultados", icon:"📊",label:"Resultados"},
  ];
  const jugScreens={
    fecha:     React.createElement(FechaScreen,{user,pronos,setPronos,partidos,setPartidos,onGoReglas:()=>setScreen("reglas")}),
    reglas:    React.createElement(ReglasScreen,{user,partidos,pronos,onBack:()=>setScreen("fecha")}),
    tabla:     React.createElement(TablaScreen,{user}),
    puntos:    React.createElement(MisPuntajesScreen,{user}),
    resultados:React.createElement(ResultadosScreen,{pronos}),
  };
  const currentScreen=jugScreens[screen]||jugScreens.fecha;
  const showRightPanel=isDesktop&&screen!=="reglas";

  if(isDesktop){
    return(
      <div style={{background:C.bg,minHeight:"100vh"}}>
        <DemoBanner/>
        <div style={{display:"flex",height:"100vh"}}>
          {/* Sidebar */}
          <Sidebar nav={jugNav} screen={screen} setScreen={s=>{if(s==="reglas")setScreen("reglas");else setScreen(s);}}
            activeColor={C.accent} user={user} onLogout={handleLogout}
            title="APP PRODE" subtitle="Temporada 2026"/>

          {/* Main content */}
          <div style={{
            flex:1,overflowY:"auto",
            maxWidth:showRightPanel?640:900,
            borderRight:showRightPanel?`1px solid ${C.border}`:"none",
          }}>
            {currentScreen}
          </div>

          {/* Right panel */}
          {showRightPanel&&React.createElement(RightPanel,{user,tabla,pronos,partidos})}

          {/* Relleno si no hay right panel */}
          {!showRightPanel&&<div style={{flex:1}}/>}
        </div>
      </div>
    );
  }

  // Mobile
  return(
    <div style={{background:C.bg,minHeight:"100vh",paddingBottom:72}}>
      <DemoBanner/>
      <div style={{padding:"13px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",background:C.card,borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,zIndex:20}}>
        <div>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,letterSpacing:2,color:C.accent}}>APP PRODE</span>
          <span style={{display:"block",fontSize:10,color:C.text2,marginTop:-1}}>Temporada 2026</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:12,color:C.text2}}>{user.nombre}</span>
          <button onClick={handleLogout} style={{background:"rgba(255,255,255,.06)",border:"none",width:32,height:32,borderRadius:8,color:C.text2,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>⎋</button>
        </div>
      </div>
      {currentScreen}
      <BottomNav nav={jugNav} screen={screen} setScreen={setScreen} activeColor={C.accent}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AppProde));
</script>
