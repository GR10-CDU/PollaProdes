<style>
:root{

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);font-family:var(--fb);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
input,button{font-family:var(--fb)}
button{cursor:pointer;border:none;background:none;color:inherit}

::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

input:focus{outline:none;border-color:rgba(0,224,144,.5)!important}

@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

// ── API (CORS fix: text/plain) ──
async function api(action,p={}){
  const b={action,apiSecret:API_SECRET,sessionToken:App.token||undefined,...p};
  try{
    const r=await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify(b),
      redirect:"follow"
    });
    return await r.json();
  }catch(e){return{ok:false,error:"Sin conexión: "+e.message};}
}

function save(u,t){App.user=u;App.token=t;localStorage.setItem(SK,t);localStorage.setItem(UK,JSON.stringify(u));}
function load(){const t=localStorage.getItem(SK),u=localStorage.getItem(UK);if(t&&u){App.token=t;App.user=JSON.parse(u);return true;}return false;}
function logout(){api("logout");localStorage.removeItem(SK);localStorage.removeItem(UK);App.user=null;App.token=null;showLogin();}

function nav(){return App.user?.rol==="Admin"?NAV_A:NAV_J;}

function go(k,ctx={}){
  App.screen=k;App.ctx=ctx;
  const item=nav().find(n=>n.k===k)||{t:k};
  renderNav();
  const tt=document.getElementById("tt");if(tt)tt.textContent=item.t||k;
  const html=renderScreen(k,ctx);
  const dc=document.getElementById("content");if(dc)dc.innerHTML=html;
  const mc=document.getElementById("mc");if(mc)mc.innerHTML=html;
  setTimeout(()=>afterRender(k,ctx),50);
}

function renderNav(){
  const n=nav();
  const sn=document.getElementById("sidebar-nav");
  if(sn)sn.innerHTML=n.map(x=>`<div class="ni${App.screen===x.k?" active":""}" onclick="go('${x.k}')"><span class="ic">${x.i}</span><span>${x.l}</span></div>`).join("");
  const bn=document.getElementById("bni");
  if(bn)bn.innerHTML=n.slice(0,5).map(x=>`<div class="bni-item${App.screen===x.k?" active":""}" onclick="go('${x.k}')"><span class="ic">${x.i}</span><span class="lb">${x.l}</span></div>`).join("");
}

function renderScreen(k,ctx){
  switch(k){
    case"fechas":return rFechas();
    case"fecha-det":return rFechaDet(ctx);
    case"jugar":return rJugar(ctx);
    case"tabla":return rTabla(ctx);
    case"grilla":return rGrilla(ctx);
    case"stats":return rStats();
    case"perfil":return rPerfil();
    case"admin-dash":return rAdminDash();
    case"admin-fechas":return rAdminFechas();
    case"admin-importar":return rAdminImportar();
    case"admin-res":return rAdminRes();
    case"admin-users":return rAdminUsers();
    default:return`<div class="es"><div class="ic">🔧</div><p>En construcción</p></div>`;
  }
}

/* ── FECHAS ── */
function rFechas(){return`<div class="fu"><div class="ph"><h2>FECHAS</h2><p>Seleccioná una fecha para jugar</p></div><div id="fl"><div class="sw"><div class="spinner"></div></div></div></div>`;}

  if(!r.fechas?.length){el.innerHTML=`<div class="es"><div class="ic">📅</div><p>No hay fechas disponibles</p></div>`;return;}

  else{toast("🔄 Procesando pago...");const mp=await api("crearPreferencia",{inscripcionId:r.inscripcionId});if(mp.ok&&mp.initPoint)window.location.href=mp.initPoint;else toast("💡 "+(mp.error||"MP no configurado aún"));}
};

/* ── JUGAR ── */
window._pr={};window._re={};window._ct={};window._pa=[];
function rJugar(ctx){return`<div class="fu"><div class="bk" onclick="go('fecha-det',{fechaId:'${ctx.fechaId}'})">← Volver</div><div class="prg"><div class="prgf" id="pb" style="width:0%"></div></div><div id="jc"><div class="sw"><div class="spinner"></div></div></div><div id="jf" style="margin-top:18px"></div></div>`;}
async function lJugar(ctx){
  const[rf,rm]=await Promise.all([api("getFecha",{fechaId:ctx.fechaId}),api("getMiFecha",{fechaId:ctx.fechaId,pozoId:ctx.pozoId})]);
  if(!rf.ok){toast("Error cargando fecha");return;}
  window._ct=ctx;window._pa=rf.partidos||[];window._pr={};window._re={};
  if(rm.ok){rm.pronos?.forEach(p=>{window._pr[p.partidoId]={v:p.pronostico,cr:p.cambiosRestantes,reg:p.tieneRegla};});rm.reglas?.forEach(r=>{window._re[r.partidoId]=r;});}
  rParts(rf.partidos,ctx,rf.fecha.puedeJugar);
}
function rParts(parts,ctx,puede){
  const el=document.getElementById("jc");if(!el)return;
  const comp=Object.keys(window._pr).length,tot=parts.length;
  const pb=document.getElementById("pb");if(pb)pb.style.width=`${(comp/tot)*100}%`;
  el.innerHTML=parts.map(p=>{
    const pr=window._pr[p.id]||{},re=window._re[p.id];
    const sel=pr.v,cr=pr.cr!==undefined?pr.cr:3,bloq=!!re||cr===0||!puede||p.golesLocal!==null;
    return`<div class="pcard${sel?" ok":""}" id="pc-${p.id}">
      <div class="ph2">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;color:var(--text2)">#${p.numero}</span>
          ${p.tipo!=="Normal"?`<span class="bdg ${p.tipo==="Polla"?"bgold":"bgray"}">${p.tipo==="Polla"?"⭐":"×2"} ${p.tipo}</span>`:`<span class="bdg bgray">NORMAL</span>`}
          ${p.estado==="En Vivo"?`<span class="bdg blive">● VIVO</span>`:""}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${sel?`<span class="cb ${cr===3?"ok":cr>0?"warn":"ag"}">🔄 ${cr}</span>`:""}
          ${sel?`<span class="rb${re?" ap":""}" onclick="openReg('${p.id}')">⭐ ${re?re.codigo:"REGLA"}</span>`:""}
        </div>
      </div>
      <div class="pteams">
        <span class="pt">${p.local}</span>
        ${p.golesLocal!==null?`<span class="psc">${p.golesLocal}-${p.golesVisita}</span>`:`<span class="pvs">VS</span>`}
        <span class="pt r">${p.visita}</span>
      </div>
      ${!bloq?`<div class="lev">${["L","E","V"].map(v=>{const pc=v==="L"?p.pct?.pctL:v==="E"?p.pct?.pctE:p.pct?.pctV;return`<button class="lb2 ${v}${sel===v?" sel":""}" onclick="gP('${p.id}','${v}','${ctx.fechaId}','${ctx.pozoId}')"><span class="ll">${v}</span><span class="lp">${pc||"?"}%</span></button>`;}).join("")}</div>`
      :sel?`<div style="padding:9px 12px;background:rgba(255,255,255,.04);border-radius:8px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--text2)">${re?"🔒 Regla":cr===0?"🚫 Sin cambios":"Tu pronóstico"}</span>
        <span style="font-family:var(--fd);font-size:24px;font-weight:900;color:${sel==="L"?"var(--L)":sel==="E"?"var(--E)":"var(--V)"}">${sel}</span></div>`
      :`<div style="padding:9px 12px;background:rgba(255,255,255,.03);border-radius:8px;text-align:center;font-size:12px;color:var(--text3)">Sin pronóstico</div>`}
      <div class="pbar"><div class="pl" style="width:${p.pct?.pctL||33}%"></div><div class="pe" style="width:${p.pct?.pctE||34}%"></div><div class="pv" style="width:${p.pct?.pctV||33}%"></div></div>
    </div>`;
  }).join("");
  const jf=document.getElementById("jf");
  if(jf&&puede)jf.innerHTML=`<button class="btn btn-p btn-lg" onclick="ag()">💾 GUARDAR PRONÓSTICOS</button>`;
}
window.gP=async(pid,v,fid,poid)=>{
  const prev=window._pr[pid]?{...window._pr[pid]}:null;
  if(!window._pr[pid])window._pr[pid]={v,cr:3,reg:false};
  else{window._pr[pid].v=v;window._pr[pid].cr=Math.max(0,(prev?.cr||3)-1);}
  rParts(window._pa,window._ct,true);
  const r=await api("guardarPronostico",{fechaId:fid,pozoId:poid,partidoId:pid,pronostico:v});
  if(!r.ok){toast("❌ "+r.error);if(prev)window._pr[pid]=prev;else delete window._pr[pid];rParts(window._pa,window._ct,true);return;}
  if(r.cambiosRestantes!==undefined){window._pr[pid].cr=r.cambiosRestantes;rParts(window._pa,window._ct,true);}
  if(r.mensaje&&r.cambio)toast(r.mensaje);
};
window.ag=async()=>{
  const ps=Object.entries(window._pr).map(([id,p])=>({partidoId:id,pronostico:p.v}));
  const r=await api("autoguardar",{fechaId:window._ct.fechaId,pozoId:window._ct.pozoId,pronos:ps});
  toast(r.ok?`✅ ${r.guardados} guardados`:"❌ "+r.error);
};
window.openReg=async(pid)=>{
  const re=window._re[pid];if(re){toast(`🔒 "${re.nombre}" — definitiva`);return;}
  const r=await api("getReglasDisponibles",{fechaId:window._ct.fechaId,pozoId:window._ct.pozoId,partidoId:pid});
  if(!r.ok){toast("❌ "+r.error);return;}
  const m=document.createElement("div");m.className="mo";m.onclick=e=>{if(e.target===m)m.remove();};
  m.innerHTML=`<div class="mb">
    <div class="mh2">
      <div><div class="mt2">REGLAS ESPECIALES</div>
      <p style="font-size:12px;color:var(--text2);margin-top:3px">Pronóstico: <strong style="color:${r.pronosticoActual==="L"?"var(--L)":r.pronosticoActual==="E"?"var(--E)":"var(--V)"}">${r.pronosticoActual}</strong></p></div>
      <div class="mc2" onclick="this.closest('.mo').remove()">×</div>
    </div>
    <div style="background:rgba(255,184,0,.06);border:1px solid rgba(255,184,0,.15);border-radius:8px;padding:10px 13px;margin-bottom:14px;font-size:12px;color:var(--gold)">
      ⚠️ Las reglas son <strong>definitivas</strong>. No se pueden cambiar.
    </div>
    ${r.disponibles.map(x=>`
      <div class="ro" onclick="apReg('${pid}','${x.codigo}')">
        <div class="roh"><span class="rnm">${x.nombre}</span><span class="rpt">${x.pts}</span></div>
        <p class="rds">${x.desc}</p>
        ${x.codigo==="MK"?`<input class="inp" id="mk-${pid}" placeholder="Resultado exacto (ej: 2-1)" style="margin-top:8px;font-size:13px" onclick="event.stopPropagation()"/>`:""}
      </div>`).join("")}
    ${!r.disponibles.length?`<div class="es" style="padding:28px"><div class="ic">🚫</div><p>Sin reglas para pronóstico ${r.pronosticoActual}</p></div>`:""}
  </div>`;
  document.body.appendChild(m);
};
window.apReg=async(pid,cod)=>{
  let det="";if(cod==="MK"){det=document.getElementById("mk-"+pid)?.value||"";if(!det){toast("Ingresá resultado exacto");return;}}
  document.querySelector(".mo")?.remove();toast("Aplicando...");
  const r=await api("guardarRegla",{fechaId:window._ct.fechaId,pozoId:window._ct.pozoId,partidoId:pid,codigoRegla:cod,detalle:det});
  if(!r.ok){toast("❌ "+r.error);return;}
  window._re[pid]={codigo:cod,nombre:r.regla?.nombre};

    <div id="imp-partidos-wrap" style="display:none">
      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <p style="font-family:var(--fd);font-size:13px;font-weight:800;letter-spacing:1.5px;color:var(--text2);text-transform:uppercase">PASO 3 — SELECCIONAR PARTIDOS</p>
          <div style="display:flex;gap:8px">
            <button class="btn btn-s" style="padding:6px 12px;font-size:12px" onclick="selTodos(true)">Todos</button>
            <button class="btn btn-s" style="padding:6px 12px;font-size:12px" onclick="selTodos(false)">Ninguno</button>
          </div>
        </div>
        <div style="background:rgba(0,224,144,.06);border:1px solid rgba(0,224,144,.15);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--accent)">
          ℹ️ Los tipos se asignan automáticamente: <strong>#10 = Polla ⭐</strong> · <strong>Últimos 25% = Doble ×2</strong> · Resto = Normal
        </div>
        <div id="imp-lista"></div>
      </div>

      <!-- PASO 4: Importar -->
      <div style="margin-bottom:32px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <span style="font-size:13px;color:var(--text2)" id="imp-contador">0 partidos seleccionados</span>
          <span style="font-size:11px;color:var(--text2)" id="imp-tipos-resumen"></span>
        </div>
        <button class="btn btn-p btn-lg" id="btn-importar" onclick="importarPartidos()" disabled>
          ✅ IMPORTAR PARTIDOS SELECCIONADOS
        </button>
      </div>
    </div>
  </div>`;
}

window._impPartidos = [];
window._impSel = new Set();

async function lAdminImportar(ctx){
  // Cargar fechas disponibles
  const r = await api("getFechas");
  const sel = document.getElementById("imp-fecha-id");
  if(!sel) return;
  const fechas = (r.fechas||[]).filter(f=>["Borrador","Abierta"].includes(f.estado));
  if(!fechas.length){
    sel.innerHTML=`<option value="">Sin fechas abiertas — creá una primero</option>`;
    return;
  }
  sel.innerHTML = fechas.map(f=>`<option value="${f.id}">${f.nombre}</option>`).join("");
}

window.onChangeFechaImp = ()=>{
  // nada por ahora, la fecha se usa al importar
};

window.onChangeLiga = async()=>{
  const liga = document.getElementById("imp-liga")?.value;
  const selRonda = document.getElementById("imp-ronda");
  const btnBuscar = document.getElementById("btn-buscar-partidos");
  if(!liga||!selRonda){return;}

  selRonda.disabled = true;
  selRonda.innerHTML = `<option>Cargando rondas...</option>`;
  btnBuscar.disabled = true;

  const r = await api("getRondas", {liga});
  if(!r.ok||!r.rondas?.length){
    selRonda.innerHTML=`<option value="">Sin rondas disponibles</option>`;
    return;
  }

  selRonda.innerHTML = r.rondas.map(rn=>`<option value="${rn}">${rn}</option>`).join("");
  selRonda.disabled = false;
  btnBuscar.disabled = false;
};

window.buscarPartidosAPI = async()=>{
  const liga  = document.getElementById("imp-liga")?.value;
  const ronda = document.getElementById("imp-ronda")?.value;
  if(!liga||!ronda){toast("Seleccioná liga y ronda");return;}

  const btn = document.getElementById("btn-buscar-partidos");
  if(btn){btn.textContent="🔍 Buscando...";btn.disabled=true;}

  const r = await api("buscarPorRonda",{liga,ronda});

  if(btn){btn.textContent="🔍 BUSCAR PARTIDOS";btn.disabled=false;}
  if(!r.ok){toast("❌ "+r.error);return;}

  window._impPartidos = r.partidos||[];
  window._impSel = new Set(window._impPartidos.map(p=>p.apiId));

  renderListaPartidos();

  const wrap = document.getElementById("imp-partidos-wrap");
  if(wrap) wrap.style.display = "block";
  toast(`✅ ${r.partidos.length} partidos encontrados`);
};

function asignarTiposFront(total){
  const tipos={};
  const cantDobles = Math.round(total*0.25);
  for(let n=1;n<=total;n++) tipos[n]="Normal";
  if(total>=10) tipos[10]="Polla";
  let d=0;
  for(let n=total;n>=1&&d<cantDobles;n--){
    if(n===10)continue;
    tipos[n]="Doble";d++;
  }
  return tipos;
}

function renderListaPartidos(){
  const el = document.getElementById("imp-lista");
  if(!el) return;
  const ps = window._impPartidos;
  const tipos = asignarTiposFront(ps.length);

  el.innerHTML = ps.map((p,i)=>{
    const n = i+1;
    const tipo = tipos[n];
    const sel = window._impSel.has(p.apiId);
    const dt = new Date(p.fecha);
    const hora = dt.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"});
    const fecha = dt.toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"});
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <input type="checkbox" id="chk-${p.apiId}" ${sel?"checked":""} 
             onchange="togglePart('${p.apiId}')"
             style="width:18px;height:18px;cursor:pointer;accent-color:var(--accent)"/>
      <div style="width:28px;text-align:center">
        <span style="font-family:var(--fd);font-size:13px;font-weight:800;color:var(--text2)">${n}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--fd);font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
          ${p.local} <span style="color:var(--text3);font-size:12px">vs</span> ${p.visita}
        </div>
        <div style="font-size:11px;color:var(--text2)">${fecha} · ${hora}</div>
      </div>
      <span class="bdg ${tipo==="Polla"?"bgold":tipo==="Doble"?"" :"bgray"}" 
            style="${tipo==="Doble"?"background:rgba(155,109,255,.12);color:var(--purple);border:1px solid rgba(155,109,255,.2)":""}">
        ${tipo==="Polla"?"⭐ POLLA":tipo==="Doble"?"×2 DOBLE":"NORMAL"}
      </span>
    </div>`;
  }).join("");

  actualizarContador();
}

window.togglePart = id=>{
  if(window._impSel.has(id)) window._impSel.delete(id);
  else window._impSel.add(id);
  actualizarContador();
};

window.selTodos = sel=>{
  if(sel) window._impPartidos.forEach(p=>window._impSel.add(p.apiId));
  else window._impSel.clear();
  // refrescar checkboxes
  window._impPartidos.forEach(p=>{
    const chk=document.getElementById("chk-"+p.apiId);
    if(chk)chk.checked=sel;
  });
  actualizarContador();
};

function actualizarContador(){
  const n = window._impSel.size;
  const cnt = document.getElementById("imp-contador");
  const btn = document.getElementById("btn-importar");
  const res = document.getElementById("imp-tipos-resumen");
  if(cnt) cnt.textContent=`${n} partido${n!==1?"s":""} seleccionado${n!==1?"s":""}`;
  if(btn) btn.disabled = n===0;

  // Calcular tipos de los seleccionados
  const selArr = window._impPartidos.filter(p=>window._impSel.has(p.apiId));
  const tipos = asignarTiposFront(selArr.length);
  const polla  = Object.values(tipos).filter(t=>t==="Polla").length;
  const doble  = Object.values(tipos).filter(t=>t==="Doble").length;
  const normal = Object.values(tipos).filter(t=>t==="Normal").length;
  if(res) res.textContent=`⭐${polla} · ×2 ${doble} · N ${normal}`;
}

window.importarPartidos = async()=>{
  const fechaId = document.getElementById("imp-fecha-id")?.value;
  if(!fechaId){toast("Seleccioná una fecha destino");return;}

  const selArr = window._impPartidos.filter(p=>window._impSel.has(p.apiId));
  if(!selArr.length){toast("Seleccioná al menos un partido");return;}
  if(selArr.length>20){toast("Máximo 20 partidos por fecha");return;}

  const btn = document.getElementById("btn-importar");
  if(btn){btn.textContent="Importando...";btn.disabled=true;}

  // Los tipos se asignan automáticamente en el backend
  const r = await api("importarPartidos",{
    fechaId,
    partidosApi: selArr,
    // Sin tiposPartido → backend asigna automáticamente
  });

  if(btn){btn.textContent="✅ IMPORTAR PARTIDOS SELECCIONADOS";btn.disabled=false;}

  if(!r.ok){toast("❌ "+r.error);return;}

  toast(`✅ ${r.importados} partidos importados correctamente`);

  // Limpiar y volver a fechas admin
  window._impPartidos=[];
  window._impSel=new Set();
  document.getElementById("imp-partidos-wrap").style.display="none";

  setTimeout(()=>go("admin-fechas"),1200);
};

    case"tabla":lTabla(ctx);break;

    case"stats":lStats();break;
    case"admin-dash":lAdminDash();break;

    case"admin-res":lAdminRes(ctx);break;

  }
}

window.ltab=(t,el)=>{document.querySelectorAll(".ltab").forEach(x=>x.classList.remove("active"));el.classList.add("active");document.getElementById("lf").style.display=t==="l"?"block":"none";document.getElementById("rf").style.display=t==="r"?"block":"none";};
window.doL=async()=>{
  const t=document.getElementById("lt")?.value,p=document.getElementById("lp")?.value,b=document.getElementById("blb"),er=document.getElementById("le");
  if(!t||!p){if(er)er.innerHTML=`<div class="err">Completá todos los campos</div>`;return;}
  if(b){b.textContent="INGRESANDO...";b.disabled=true;}
  const r=await api("login",{telefono:t,pin:p});
  if(b){b.textContent="ENTRAR";b.disabled=false;}
  if(!r.ok){if(er)er.innerHTML=`<div class="err">⚠ ${r.error}</div>`;return;}
  save(r.user,r.sessionToken);initApp();
};
window.doR=async()=>{
  const n=document.getElementById("rn")?.value,t=document.getElementById("rt")?.value,p=document.getElementById("rp")?.value,a=document.getElementById("ra")?.value,e=document.getElementById("re2")?.value,er=document.getElementById("re");
  if(!n||!t||!p){if(er)er.innerHTML=`<div class="err">Completá los campos obligatorios</div>`;return;}
  const r=await api("registro",{nombre:n,telefono:t,pin:p,alias:a,email:e});
  if(!r.ok){if(er)er.innerHTML=`<div class="err">⚠ ${r.error}</div>`;return;}
  save(r.user,r.sessionToken);toast(`✅ Bienvenido, ${r.user.usuario}`);initApp();
};

/* ── INIT APP ── */
function initApp(){
  document.getElementById("sl").style.display="none";
  const mob=window.innerWidth<=768;
  if(mob){
    ["mh","mc","bn"].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display=id==="mc"?"block":"flex";});
    const ch=document.getElementById("mchip");if(ch)ch.textContent=App.user?.usuario||"";
  }else{
    document.getElementById("app").style.display="flex";
    const sb=document.getElementById("sidebar"),mn=document.getElementById("main");
    if(sb)sb.style.display="flex";if(mn)mn.style.display="flex";
    const su=document.getElementById("sidebar-user");
    if(su)su.innerHTML=`<div class="sav">${App.user?.avatar||"👤"}</div><div class="sui"><div class="nm">${App.user?.usuario||""}</div><div class="rl">${App.user?.rol||"Jugador"}</div></div><button class="btnlo" onclick="if(confirm('¿Cerrar sesión?'))logout()" title="Salir">⎋</button>`;
  }
  go(App.user?.rol==="Admin"?"admin-dash":"fechas");
}

/* ── TOAST ── */
function toast(msg,ms=2800){document.querySelectorAll(".toast").forEach(t=>t.remove());const e=document.createElement("div");e.className="toast";e.textContent=msg;document.body.appendChild(e);setTimeout(()=>e.remove(),ms);}

async function boot(){
  if(load()){
    const r=await api("loginConToken",{sessionToken:App.token});
    if(r.ok){save(r.user,r.sessionToken);initApp();return;}
  }
  showLogin();
}
